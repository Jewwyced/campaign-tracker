<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Song</title>
<style>
  :root {
    --bg: #ffffff;
    --surface-1: #f7f7f8;
    --surface-2: #f0f0f2;
    --border: #e4e4e7;
    --text-primary: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-dim: #4f46e5;
    --success-bg: #ecfdf5;
    --success-text: #059669;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; padding: 0 32px; border-bottom: 1px solid var(--border); height: 52px; }
  header .nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; margin-right: 20px; }
  header .nav a:hover { color: var(--text-primary); }
  header .nav a.active { color: var(--text-primary); font-weight: 600; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  .breadcrumb { font-size: 13px; margin-bottom: 20px; }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--text-primary); }

  .song-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .song-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .song-artist { font-size: 15px; color: var(--text-muted); margin-top: 6px; }

  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 36px; }
  .stat-box { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-box .label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .stat-box .value { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
  .stat-box .value.green { color: var(--success-text); }

  .section-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }

  /* Posts grid with thumbnails */
  .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 36px; }
  .post-card {
    border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .post-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .post-thumb {
    width: 100%; aspect-ratio: 9/16; object-fit: cover;
    background: var(--surface-2);
  }
  .post-thumb-placeholder {
    width: 100%; aspect-ratio: 9/16;
    background: linear-gradient(135deg, var(--surface-2), var(--surface-1));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--text-muted);
  }
  .post-info { padding: 10px 12px; }
  .post-username { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .post-views { font-size: 18px; font-weight: 700; margin-top: 4px; letter-spacing: -0.3px; }
  .post-likes { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Sounds list */
  .sounds-list { display: flex; flex-direction: column; gap: 8px; }
  .sound-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface-1);
  }
  .sound-name { font-size: 14px; font-weight: 500; }
  .sound-author { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .sound-count { font-size: 15px; font-weight: 700; color: var(--success-text); }
  .sound-count-lbl { font-size: 11px; color: var(--text-muted); }
  .delete-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
  }
  .delete-btn:hover { background: var(--danger-bg); color: var(--danger); }

  .empty { padding: 48px; text-align: center; color: var(--text-muted); font-size: 14px; line-height: 1.8; }
  .loading { padding: 48px; text-align: center; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/songs" class="active">Songs</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
  </div>
</header>

<main>
  <div class="breadcrumb"><a href="/campaigns">&larr; Back to campaigns</a></div>

  <div class="song-header">
    <div class="song-title" id="song-title">Loading...</div>
    <div class="song-artist" id="song-artist"></div>
  </div>

  <div class="stat-row">
    <div class="stat-box"><div class="label">Total views</div><div class="value green" id="stat-views">-</div></div>
    <div class="stat-box"><div class="label">Sounds</div><div class="value" id="stat-sounds">-</div></div>
    <div class="stat-box"><div class="label">Creators</div><div class="value" id="stat-creators">-</div></div>
    <div class="stat-box"><div class="label">Posts tracked</div><div class="value" id="stat-posts">-</div></div>
  </div>

  <div class="section-label">Top Posts</div>
  <div class="posts-grid" id="posts-grid"><div class="loading">Loading posts...</div></div>

  <div class="section-label">Sounds</div>
  <div class="sounds-list" id="sounds-list"><div class="loading">Loading sounds...</div></div>
</main>

<script>
const songId = window.location.pathname.split('/').pop();

function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function load() {
  const res = await fetch(`/api/songs/${songId}/detail`);
  if (!res.ok) {
    document.getElementById('song-title').textContent = 'Song not found';
    return;
  }
  const data = await res.json();
  const song = data.song;
  const sounds = data.sounds || [];
  const posts = data.top_posts || [];

  document.title = song.name;
  document.getElementById('song-title').textContent = song.name;
  document.getElementById('song-artist').textContent = song.artist || '';

  const totalViews = posts.reduce((s, p) => s + (parseInt(p.views) || 0), 0);
  const creators = new Set(posts.map(p => p.username)).size;

  document.getElementById('stat-views').textContent = fmt(totalViews);
  document.getElementById('stat-sounds').textContent = sounds.length;
  document.getElementById('stat-creators').textContent = creators;
  document.getElementById('stat-posts').textContent = posts.length;

  // Posts grid with thumbnails
  const postsGrid = document.getElementById('posts-grid');
  if (posts.length === 0) {
    postsGrid.innerHTML = '<div class="empty">No posts yet.<br>Posts will appear here after the next refresh.</div>';
  } else {
    const topPosts = [...posts].sort((a, b) => (parseInt(b.views) || 0) - (parseInt(a.views) || 0)).slice(0, 12);
    postsGrid.innerHTML = topPosts.map(p => `
      <a class="post-card" href="https://tiktok.com/@${escapeHtml(p.username)}/video/${escapeHtml(p.post_id)}" target="_blank">
        ${p.thumbnail
          ? `<img class="post-thumb" src="${escapeHtml(p.thumbnail)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="post-thumb-placeholder" ${p.thumbnail ? 'style="display:none"' : ''}>🎵</div>
        <div class="post-info">
          <div class="post-username">@${escapeHtml(p.username)}</div>
          <div class="post-views">${fmt(p.views)}</div>
          <div class="post-likes">${fmt(p.likes)} likes</div>
        </div>
      </a>
    `).join('');
  }

  // Sounds list
  const soundsList = document.getElementById('sounds-list');
  if (sounds.length === 0) {
    soundsList.innerHTML = '<div class="empty">No sounds tracked yet.</div>';
  } else {
    soundsList.innerHTML = sounds.map(s => `
      <div class="sound-row">
        <div>
          <div class="sound-name">${escapeHtml(s.title || 'Unknown sound')}</div>
          <div class="sound-author">${escapeHtml(s.author || '')}</div>
        </div>
        <div style="text-align:right;">
          <div class="sound-count">${fmt(s.current_video_count)}</div>
          <div class="sound-count-lbl">videos</div>
        </div>
        <button class="delete-btn" onclick="deleteSound(${s.id})" title="Remove sound">×</button>
      </div>
    `).join('');
  }
}

async function deleteSound(soundId) {
  if (!confirm('Remove this sound?')) return;
  await fetch(`/api/sounds/${soundId}`, { method: 'DELETE' });
  load();
}

load();
</script>
</body>
</html>
