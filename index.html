<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Campaigns</title>
<style>
  :root {
    --bg: #ffffff;
    --surface-1: #f7f7f8;
    --surface-2: #f0f0f2;
    --border: #e4e4e7;
    --text-primary: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-dim: #4f46e5;
    --success-bg: #ecfdf5;
    --success-text: #059669;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; padding: 0 32px; border-bottom: 1px solid var(--border); height: 52px; }
  header .nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; margin-right: 20px; }
  header .nav a:hover { color: var(--text-primary); }
  header .nav a.active { color: var(--text-primary); font-weight: 600; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  .hero {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    border-radius: 16px; padding: 28px 32px;
    color: white; margin-bottom: 32px;
    display: flex; gap: 40px; align-items: center;
  }
  .hero-stat { }
  .hero-stat .val { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
  .hero-stat .lbl { font-size: 12px; opacity: .75; margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .hero-divider { width: 1px; background: rgba(255,255,255,.2); align-self: stretch; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-title { font-size: 20px; font-weight: 700; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .btn-primary { font-size: 13px; font-family: inherit; background: var(--accent); color: white; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-weight: 500; }
  .btn-primary:hover { background: var(--accent-dim); }

  .campaigns-grid { display: flex; flex-direction: column; gap: 10px; }
  .campaign-row {
    display: grid; grid-template-columns: 1fr 120px 90px 130px 100px 40px;
    align-items: center; gap: 12px;
    padding: 16px 20px; border-radius: 12px;
    border: 1px solid var(--border); cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    background: var(--bg);
  }
  .campaign-row:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(99,102,241,.08); }
  .campaign-row.header-row {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .4px;
    cursor: default; border: none; padding: 0 20px; margin-bottom: 4px;
  }
  .campaign-row.header-row:hover { border-color: transparent; box-shadow: none; }
  .camp-name { font-size: 15px; font-weight: 600; }
  .camp-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; background: currentColor; }
  .pill.active { background: var(--success-bg); color: var(--success-text); }
  .pill.wrapped { background: var(--surface-2); color: var(--text-muted); }
  .views-val { font-size: 15px; font-weight: 700; }
  .delete-x { background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .delete-x:hover { background: var(--danger-bg); color: var(--danger); }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; margin-top: 14px; }
  .modal input, .modal select { width: 100%; font-family: inherit; font-size: 14px; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text-primary); }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
  .btn-cancel { font-size: 13px; font-family: inherit; background: none; border: 1px solid var(--border); padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  #modal-error { font-size: 13px; color: var(--danger); margin-top: 10px; display: none; }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/campaigns" class="active">Campaigns</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
    <a href="/fanpages">Fan Pages</a>
  </div>
</header>

<main>
  <div class="hero" id="hero" style="display:none;">
    <div class="hero-stat"><div class="val" id="hero-views">-</div><div class="lbl">Total Views</div></div>
    <div class="hero-divider"></div>
    <div class="hero-stat"><div class="val" id="hero-posts">-</div><div class="lbl">Posts Tracked</div></div>
    <div class="hero-divider"></div>
    <div class="hero-stat"><div class="val" id="hero-campaigns">-</div><div class="lbl">Campaigns</div></div>
  </div>

  <div class="page-header">
    <div>
      <div class="page-title">Campaigns</div>
      <div class="page-sub" id="page-sub">Loading...</div>
    </div>
    <button class="btn-primary" onclick="openModal()">+ New campaign</button>
  </div>

  <div class="campaign-row header-row">
    <div>Campaign</div>
    <div>Status</div>
    <div>Posts</div>
    <div>Total views</div>
    <div>Created</div>
    <div></div>
  </div>
  <div class="campaigns-grid" id="campaigns-grid"></div>
</main>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>New campaign</h2>
    <label>Campaign name</label>
    <input type="text" id="new-name" placeholder="e.g. ADL">
    <label>Artist</label>
    <input type="text" id="new-artist" placeholder="e.g. Yeat">
    <label>Type</label>
    <select id="new-type">
      <option value="single">Single</option>
      <option value="album">Album</option>
    </select>
    <div id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createCampaign()">Create</button>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function timeAgo(str) {
  const d = new Date(str);
  const s = (Date.now() - d) / 1000;
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function load() {
  const res = await fetch('/api/campaigns');
  const campaigns = await res.json();
  if (!Array.isArray(campaigns)) return;

  const totalViews = campaigns.reduce((s, c) => s + (parseInt(c.total_views) || 0), 0);
  const totalPosts = campaigns.reduce((s, c) => s + (parseInt(c.post_count) || 0), 0);

  document.getElementById('hero-views').textContent = fmt(totalViews);
  document.getElementById('hero-posts').textContent = fmt(totalPosts);
  document.getElementById('hero-campaigns').textContent = campaigns.length;
  document.getElementById('hero').style.display = 'flex';
  document.getElementById('page-sub').textContent = campaigns.length + ' campaigns';

  const grid = document.getElementById('campaigns-grid');
  grid.innerHTML = campaigns.map(c => `
    <div class="campaign-row" onclick="window.location.href='/campaign/${c.id}'">
      <div>
        <div class="camp-name">${escapeHtml(c.name)}</div>
        <div class="camp-artist">${escapeHtml(c.artist || '')}</div>
      </div>
      <div>
        <span class="pill ${c.status === 'In Progress' ? 'active' : 'wrapped'}">
          <span class="dot"></span>${escapeHtml(c.status)}
        </span>
      </div>
      <div>${c.post_count || 0}</div>
      <div class="views-val">${fmt(c.total_views)}</div>
      <div style="color:var(--text-muted);font-size:13px;">${timeAgo(c.created_at)}</div>
      <div>
        <button class="delete-x" onclick="event.stopPropagation(); deleteCampaign(${c.id}, '${escapeHtml(c.name)}')" title="Delete">×</button>
      </div>
    </div>
  `).join('');
}

async function deleteCampaign(id, name) {
  if (!confirm(`Delete "${name}"? This can't be undone.`)) return;
  await fetch(`/api/campaigns/${id}`, { method: 'DELETE' });
  load();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('new-name').focus();
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-error').style.display = 'none';
}

async function createCampaign() {
  const name = document.getElementById('new-name').value.trim();
  const artist = document.getElementById('new-artist').value.trim();
  const release_type = document.getElementById('new-type').value;
  const errEl = document.getElementById('modal-error');
  if (!name) { errEl.textContent = 'Campaign name required.'; errEl.style.display = 'block'; return; }
  const res = await fetch('/api/campaigns', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, artist, release_type })
  });
  const data = await res.json();
  if (!res.ok) { errEl.textContent = data.error || 'Something went wrong.'; errEl.style.display = 'block'; return; }
  closeModal();
  window.location.href = `/campaign/${data.id}`;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>
</body>
</html>
