<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Songs</title>
<style>
  :root {
    --bg: #ffffff;
    --surface-1: #f7f7f8;
    --surface-2: #f0f0f2;
    --border: #e4e4e7;
    --text-primary: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-dim: #4f46e5;
    --success-text: #059669;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; padding: 20px 32px; border-bottom: 1px solid var(--border); }
  header .nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; margin-right: 16px; }
  header .nav a.current { color: var(--text-primary); font-weight: 500; }
  header .nav a:hover { color: var(--text-primary); }
  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  .toolbar { margin-bottom: 20px; }
  .title { font-size: 18px; font-weight: 500; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .search-card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 24px;
  }
  .search-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .search-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; font-family: inherit; font-size: 14px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text-primary);
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button {
    font-size: 13px; font-family: inherit;
    background: var(--accent); color: white; border: none;
    padding: 10px 18px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { background: var(--text-muted); cursor: default; }
  #search-error { font-size: 13px; color: var(--danger); margin-top: 10px; }
  #search-status { font-size: 13px; color: var(--text-muted); margin-top: 10px; }

  .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .row {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
    padding: 14px 16px; align-items: center; border-top: 1px solid var(--border);
  }
  .row.header-row { border-top: none; background: var(--surface-1); font-size: 12px; color: var(--text-muted); padding: 10px 16px; }
  .row:not(.header-row) { cursor: pointer; }
  .row:not(.header-row):hover { background: var(--surface-1); }
  .song-name { font-size: 14px; font-weight: 500; }
  .song-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .cell-num { font-size: 14px; color: var(--text-secondary); }
  .cell-muted { font-size: 13px; color: var(--text-muted); }
  .empty { padding: 48px; text-align: center; color: var(--text-muted); font-size: 14px; }
  #status { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; min-height: 16px; }
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/songs" class="current">Songs</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
    <a href="/fanpages">Fan Pages</a>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="title">Songs</div>
    <div class="subtitle" id="songs-count">Loading...</div>
  </div>

  <div class="search-card">
    <div class="search-label">Search any song — if we're not tracking it yet, we'll start now</div>
    <div class="search-row">
      <input type="text" id="song-search-input" placeholder="Song name + artist, e.g. Griddle Yeat">
      <button onclick="addSong()" id="add-song-btn">Search</button>
    </div>
    <div id="search-error"></div>
    <div id="search-status"></div>
  </div>

  <div id="status"></div>

  <div class="table-wrap">
    <div class="row header-row">
      <div>Song</div>
      <div>Sounds</div>
      <div>Creators</div>
      <div>Total creates</div>
      <div>Total views</div>
    </div>
    <div id="song-rows"></div>
  </div>
</main>

<script>
function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function loadSongs() {
  try {
    const res = await fetch('/api/songs');
    const songs = await res.json();
    renderSongs(songs);
    document.getElementById('status').textContent = '';
  } catch (e) {
    document.getElementById('status').textContent = 'Could not reach the server.';
  }
}

function renderSongs(songs) {
  document.getElementById('songs-count').textContent =
    songs.length === 0 ? 'No songs tracked yet' : `${songs.length} song${songs.length === 1 ? '' : 's'} tracked`;

  const rowsEl = document.getElementById('song-rows');
  if (songs.length === 0) {
    rowsEl.innerHTML = '<div class="empty">No songs yet.<br><span style="font-size:13px;">Search one above to start tracking.</span></div>';
    return;
  }

  rowsEl.innerHTML = songs.map(s => `
    <div class="row" onclick="window.location.href='/song/${s.id}'">
      <div>
        <div class="song-name">${escapeHtml(s.name)}</div>
        <div class="song-artist">${escapeHtml(s.artist || '')}</div>
      </div>
      <div class="cell-num">${s.sound_count}</div>
      <div class="cell-num">${fmt(s.creator_count)}</div>
      <div class="cell-num">${fmt(s.post_count)}</div>
      <div class="cell-num">${fmt(s.views)}</div>
    </div>
  `).join('');
}

async function addSong() {
  const input = document.getElementById('song-search-input');
  const btn = document.getElementById('add-song-btn');
  const errEl = document.getElementById('search-error');
  const statusEl = document.getElementById('search-status');
  const query = input.value.trim();
  if (!query) return;

  // Split into name + artist as a best-effort guess — last word(s) often the artist.
  // Keep it simple: send the whole string as "name", backend also uses it for search.
  btn.disabled = true;
  btn.textContent = 'Searching...';
  errEl.textContent = '';
  statusEl.textContent = 'Searching TikTok for matching sounds — this can take a moment...';

  try {
    const res = await fetch('/api/songs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: query })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong.';
      statusEl.textContent = '';
    } else {
      statusEl.textContent = `Found ${data.sounds_found} sound${data.sounds_found === 1 ? '' : 's'}. Opening...`;
      setTimeout(() => { window.location.href = `/song/${data.song_id}`; }, 600);
    }
  } catch (e) {
    errEl.textContent = 'Could not reach the server.';
    statusEl.textContent = '';
  }

  btn.disabled = false;
  btn.textContent = 'Search';
}

document.getElementById('song-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSong();
});

loadSongs();
</script>

</body>
</html>
