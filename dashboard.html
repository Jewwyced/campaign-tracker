<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e4e4e7;
    --border-light: #f0f0f2;
    --text-primary: #09090b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --success: #059669;
    --success-bg: #ecfdf5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; padding: 0 32px; border-bottom: 1px solid var(--border); height: 52px; background: white; }
  header .nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; margin-right: 20px; }
  header .nav a:hover { color: var(--text-primary); }
  header .nav a.active { color: var(--text-primary); font-weight: 600; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  main { padding: 32px; max-width: 1100px; margin: 0 auto; }

  .hero {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    border-radius: 16px; padding: 32px;
    color: white; margin-bottom: 28px;
  }
  .hero-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; opacity: .8; margin-bottom: 8px; }
  .hero-views { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .hero-sub { font-size: 14px; opacity: .75; margin-top: 8px; }
  .hero-stats { display: flex; gap: 32px; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.2); }
  .hero-stat .val { font-size: 24px; font-weight: 700; }
  .hero-stat .lbl { font-size: 12px; opacity: .7; margin-top: 2px; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-card .label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .value { font-size: 32px; font-weight: 800; margin-top: 8px; letter-spacing: -1px; }
  .stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-card .trend { font-size: 13px; font-weight: 600; color: var(--success); margin-top: 4px; }

  .ai-box { background: var(--accent-light); border: 1px solid #c7d2fe; border-radius: 12px; padding: 18px 20px; margin-bottom: 28px; }
  .ai-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--accent); margin-bottom: 8px; }
  .ai-text { font-size: 14px; line-height: 1.7; color: #3730a3; }

  /* Digest sections */
  .digest-section { margin-bottom: 32px; }
  .digest-section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .digest-empty { color: var(--text-muted); font-size: 13px; padding: 20px; text-align: center; background: white; border: 1px solid var(--border); border-radius: 12px; }

  .milestone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .milestone-card {
    display: flex; gap: 12px; background: white; border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; cursor: pointer; transition: box-shadow .15s, border-color .15s;
    text-decoration: none; color: inherit;
  }
  .milestone-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(99,102,241,.1); }
  .milestone-thumb { width: 56px; height: 74px; border-radius: 8px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .milestone-thumb-placeholder { width: 56px; height: 74px; border-radius: 8px; background: linear-gradient(135deg, #f0f0f4, #e8e8ec); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-muted); }
  .milestone-body { min-width: 0; flex: 1; }
  .milestone-tier { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-bottom: 5px; }
  .milestone-tier.t1000 { background: #fef3c7; color: #b45309; }
  .milestone-tier.t5000 { background: #e0e7ff; color: #4338ca; }
  .milestone-tier.t10000 { background: #fce7f3; color: #be185d; }
  .milestone-summary { font-size: 13px; font-weight: 600; line-height: 1.4; }
  .milestone-summary b { color: var(--accent); }
  .milestone-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-row {
    display: flex; align-items: center; gap: 12px; background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 16px; text-decoration: none; color: inherit;
    transition: border-color .15s;
  }
  .activity-row:hover { border-color: var(--accent); }
  .activity-thumb { width: 36px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .activity-thumb-placeholder { width: 36px; height: 48px; border-radius: 6px; background: linear-gradient(135deg, #f0f0f4, #e8e8ec); flex-shrink: 0; }
  .activity-info { flex: 1; min-width: 0; }
  .activity-username { font-size: 13px; font-weight: 600; }
  .activity-song { font-size: 12px; color: var(--text-muted); }
  .activity-stats { text-align: right; flex-shrink: 0; }
  .activity-views { font-size: 14px; font-weight: 700; color: var(--success); }
  .activity-likes { font-size: 11px; color: var(--text-muted); }

  .trend-bars { display: flex; align-items: flex-end; gap: 8px; height: 100px; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .trend-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
  .trend-bar { width: 100%; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 3px; }
  .trend-bar-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .trend-bar-value { font-size: 10px; font-weight: 700; color: var(--text-secondary); }

  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .campaigns-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .campaign-row {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  .campaign-row:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(99,102,241,.08); }
  .campaign-name { font-size: 15px; font-weight: 600; }
  .campaign-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .campaign-views { font-size: 20px; font-weight: 800; color: var(--success); }
  .campaign-posts { font-size: 12px; color: var(--text-muted); margin-top: 2px; text-align: right; }

  .top-creator { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .creator-name { font-size: 18px; font-weight: 700; }
  .creator-stats { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  .loading { color: var(--text-muted); font-size: 14px; padding: 40px; text-align: center; }

  .trend-canvas-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  canvas#weekly-trend-chart { width: 100% !important; height: 220px !important; }
  .fan-page-badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; padding: 2px 7px; border-radius: 5px; background: #fce7f3; color: #be185d; margin-left: 6px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<header>
  <div class="nav">
    <a href="/" class="active">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/songs">Songs</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
    <a href="/fanpages">Fan Pages</a>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Loading...</div></div>
</main>

<script>
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function stripMd(text) {
  return (text || '').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/^#+\s/gm, '');
}
function tiktokUrl(username, postId) {
  return `https://tiktok.com/@${encodeURIComponent(username)}/video/${encodeURIComponent(postId)}`;
}
function tierClass(tier) {
  if (tier >= 10000) return 't10000';
  if (tier >= 5000) return 't5000';
  return 't1000';
}
function tierLabel(tier) {
  if (tier >= 10000) return '🥇 10K';
  if (tier >= 5000) return '🥈 5K';
  return '🥉 1K';
}

function renderMilestones(crossings) {
  if (!crossings || !crossings.length) {
    return '<div class="digest-empty">No posts crossed a milestone in the last 24h.</div>';
  }
  return `<div class="milestone-grid">${crossings.map(m => {
    const label = m.source_type === 'fan_page'
      ? 'their fan page' + '<span class="fan-page-badge">Fan Page</span>'
      : `<b>${escapeHtml(m.sound_title || m.song_name || 'Unknown sound')}</b>`;
    return `
    <a class="milestone-card" href="${tiktokUrl(m.username, m.post_id)}" target="_blank">
      ${m.thumbnail
        ? `<img class="milestone-thumb" src="${escapeHtml(m.thumbnail)}" loading="lazy">`
        : `<div class="milestone-thumb-placeholder">🎵</div>`}
      <div class="milestone-body">
        <div class="milestone-tier ${tierClass(m.tier_crossed)}">${tierLabel(m.tier_crossed)} likes</div>
        <div class="milestone-summary">@${escapeHtml(m.username)} crossed ${tierLabel(m.tier_crossed)} likes using ${label}</div>
        <div class="milestone-meta">${fmt(m.views)} views · ${fmt(m.likes)} likes</div>
      </div>
    </a>
  `;
  }).join('')}</div>`;
}

function renderActivity(activity) {
  if (!activity || !activity.length) {
    return '<div class="digest-empty">No other notable activity in the last 24h yet.</div>';
  }
  return `<div class="activity-list">${activity.map(p => {
    const label = p.source_type === 'fan_page'
      ? '<span class="fan-page-badge">Fan Page</span>'
      : escapeHtml(p.sound_title || p.song_name || '');
    return `
    <a class="activity-row" href="${tiktokUrl(p.username, p.post_id)}" target="_blank">
      ${p.thumbnail
        ? `<img class="activity-thumb" src="${escapeHtml(p.thumbnail)}" loading="lazy">`
        : `<div class="activity-thumb-placeholder"></div>`}
      <div class="activity-info">
        <div class="activity-username">@${escapeHtml(p.username)}</div>
        <div class="activity-song">${label}</div>
      </div>
      <div class="activity-stats">
        <div class="activity-views">${fmt(p.views)} views</div>
        <div class="activity-likes">${fmt(p.likes)} likes</div>
      </div>
    </a>
  `;
  }).join('')}</div>`;
}

function renderWeeklyTrend(trend) {
  if (!trend || !trend.length) {
    return '<div class="digest-empty">Not enough history yet to show a weekly trend — check back after a few days of the refresh cron running.</div>';
  }
  return '<div class="trend-canvas-wrap"><canvas id="weekly-trend-chart"></canvas></div>';
}

function drawWeeklyTrendChart(trend) {
  const ctx = document.getElementById('weekly-trend-chart');
  if (!ctx || !trend || !trend.length) return;
  if (window._weeklyTrendChart) window._weeklyTrendChart.destroy();

  const labels = trend.map(function(d) {
    const dt = new Date(d.date + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  });
  const views = trend.map(function(d) { return d.views || 0; });
  const posts = trend.map(function(d) { return d.posts || 0; });

  window._weeklyTrendChart = new Chart(ctx, {
    data: {
      labels: labels,
      datasets: [
        {
          type: 'bar',
          label: 'Posts tracked',
          data: posts,
          backgroundColor: 'rgba(99,102,241,0.18)',
          borderRadius: 4,
          yAxisID: 'y1',
          order: 2,
        },
        {
          type: 'line',
          label: 'Views',
          data: views,
          borderColor: '#6366f1',
          backgroundColor: 'rgba(99,102,241,0.08)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointBackgroundColor: '#6366f1',
          pointBorderColor: 'white',
          pointBorderWidth: 2,
          tension: 0.35,
          fill: true,
          yAxisID: 'y',
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', align: 'end', labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: function(item) {
              if (item.dataset.yAxisID === 'y') return 'Views: ' + fmt(item.raw);
              return 'Posts: ' + item.raw;
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: {
          position: 'left',
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 11 }, callback: function(v) { return fmt(v); } }
        },
        y1: {
          position: 'right',
          grid: { display: false },
          ticks: { font: { size: 11 }, stepSize: 1 }
        }
      }
    }
  });
}

async function load() {
  const res = await fetch('/api/dashboard');
  if (!res.ok) { document.getElementById('content').innerHTML = '<div class="loading">Could not load dashboard.</div>'; return; }
  const d = await res.json();

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-title">Total Views</div>
      <div class="hero-views">${fmt(d.total_views)}</div>
      <div class="hero-sub">Across ${d.active_campaigns} active campaign${d.active_campaigns !== 1 ? 's' : ''}</div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="val">${fmt(d.total_posts)}</div><div class="lbl">Posts tracked</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_creators)}</div><div class="lbl">Creators</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.views_7d)}</div><div class="lbl">Views this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.posts_7d)}</div><div class="lbl">New posts this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_sounds || 0)}</div><div class="lbl">Sounds tracked</div></div>
      </div>
    </div>

    ${d.ai_summary ? `
    <div class="ai-box">
      <div class="ai-label">✦ AI Daily Summary</div>
      <div class="ai-text">${escapeHtml(stripMd(d.ai_summary))}</div>
    </div>` : ''}

    <div class="digest-section">
      <div class="digest-section-title">🏆 Crossed a Tier Today</div>
      ${renderMilestones(d.milestone_crossings)}
    </div>

    <div class="digest-section">
      <div class="digest-section-title">📈 Today's Activity</div>
      ${renderActivity(d.todays_activity)}
    </div>

    <div class="digest-section">
      <div class="digest-section-title">📅 Weekly Trend</div>
      ${renderWeeklyTrend(d.weekly_trend)}
    </div>

    <div class="section-title">Campaigns</div>
    <div class="campaigns-list">
      ${(d.campaign_breakdown || []).map(c => `
        <div class="campaign-row" onclick="window.location.href='/campaigns'">
          <div>
            <div class="campaign-name">${escapeHtml(c.name)}</div>
            <div class="campaign-artist">${escapeHtml(c.artist || '')}</div>
          </div>
          <div style="text-align:right;">
            <div class="campaign-views">${fmt(c.views)}</div>
            <div class="campaign-posts">${c.post_count} posts</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  drawWeeklyTrendChart(d.weekly_trend);
}

load();
</script>
</body>
</html>
