<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --border: #e4e4e7;
    --border-light: #f0f0f2;
    --text-primary: #09090b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --success: #059669;
    --success-bg: #ecfdf5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; padding: 0 32px; border-bottom: 1px solid var(--border); height: 52px; background: white; }
  header .nav a { font-size: 13px; color: var(--text-secondary); text-decoration: none; margin-right: 20px; }
  header .nav a:hover { color: var(--text-primary); }
  header .nav a.active { color: var(--text-primary); font-weight: 600; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  main { padding: 32px; max-width: 1100px; margin: 0 auto; }

  .hero {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    border-radius: 16px; padding: 32px;
    color: white; margin-bottom: 28px;
  }
  .hero-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; opacity: .8; margin-bottom: 8px; }
  .hero-views { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .hero-sub { font-size: 14px; opacity: .75; margin-top: 8px; }
  .hero-stats { display: flex; gap: 32px; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.2); }
  .hero-stat .val { font-size: 24px; font-weight: 700; }
  .hero-stat .lbl { font-size: 12px; opacity: .7; margin-top: 2px; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-card .label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .value { font-size: 32px; font-weight: 800; margin-top: 8px; letter-spacing: -1px; }
  .stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-card .trend { font-size: 13px; font-weight: 600; color: var(--success); margin-top: 4px; }

  .ai-box { background: var(--accent-light); border: 1px solid #c7d2fe; border-radius: 12px; padding: 18px 20px; margin-bottom: 28px; }
  .ai-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--accent); margin-bottom: 8px; }
  .ai-text { font-size: 14px; line-height: 1.7; color: #3730a3; }

  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .campaigns-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .campaign-row {
    display: flex; align-items: center; justify-content: space-between;
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 20px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  .campaign-row:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(99,102,241,.08); }
  .campaign-name { font-size: 15px; font-weight: 600; }
  .campaign-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .campaign-views { font-size: 20px; font-weight: 800; color: var(--success); }
  .campaign-posts { font-size: 12px; color: var(--text-muted); margin-top: 2px; text-align: right; }

  .top-creator { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .creator-name { font-size: 18px; font-weight: 700; }
  .creator-stats { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  .loading { color: var(--text-muted); font-size: 14px; padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a href="/" class="active">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/songs">Songs</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Loading...</div></div>
</main>

<script>
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function stripMd(text) {
  return (text || '').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/^#+\s/gm, '');
}

async function load() {
  const res = await fetch('/api/dashboard');
  if (!res.ok) { document.getElementById('content').innerHTML = '<div class="loading">Could not load dashboard.</div>'; return; }
  const d = await res.json();

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-title">Total Views</div>
      <div class="hero-views">${fmt(d.total_views)}</div>
      <div class="hero-sub">Across ${d.active_campaigns} active campaign${d.active_campaigns !== 1 ? 's' : ''}</div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="val">${fmt(d.total_posts)}</div><div class="lbl">Posts tracked</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_creators)}</div><div class="lbl">Creators</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.views_7d)}</div><div class="lbl">Views this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.posts_7d)}</div><div class="lbl">New posts this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_sounds || 0)}</div><div class="lbl">Sounds tracked</div></div>
      </div>
    </div>

    ${d.ai_summary ? `
    <div class="ai-box">
      <div class="ai-label">✦ AI Daily Summary</div>
      <div class="ai-text">${escapeHtml(stripMd(d.ai_summary))}</div>
    </div>` : ''}

    <div class="section-title">Campaigns</div>
    <div class="campaigns-list">
      ${(d.campaign_breakdown || []).map(c => `
        <div class="campaign-row" onclick="window.location.href='/campaigns'">
          <div>
            <div class="campaign-name">${escapeHtml(c.name)}</div>
            <div class="campaign-artist">${escapeHtml(c.artist || '')}</div>
          </div>
          <div style="text-align:right;">
            <div class="campaign-views">${fmt(c.views)}</div>
            <div class="campaign-posts">${c.post_count} posts</div>
          </div>
        </div>
      `).join('')}
    </div>

  
  `;
}

load();
</script>
</body>
</html>
