<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --bg-grid: rgba(255,255,255,.025);
    --surface: #12161f;
    --surface-2: #171c27;
    --border: #232838;
    --border-soft: #1a1f2b;
    --text-primary: #edeff3;
    --text-secondary: #9aa3b8;
    --text-muted: #5b6478;
    --signal: #3ed598;
    --signal-dim: rgba(62,213,152,.13);
    --alert: #f5b841;
    --alert-dim: rgba(245,184,65,.13);
    --accent: #7c8cff;
    --accent-dim: rgba(124,140,255,.13);
    --fan: #ff6fa5;
    --fan-dim: rgba(255,111,165,.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      repeating-linear-gradient(180deg, var(--bg-grid) 0px, var(--bg-grid) 1px, transparent 1px, transparent 3px),
      var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; border-bottom: 1px solid var(--border);
    height: 56px; background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  header .brand { display: flex; align-items: center; gap: 9px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: .2px; }
  header .brand .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--signal); box-shadow: 0 0 0 3px var(--signal-dim); animation: pulse 2.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
  header .nav { display: flex; gap: 2px; }
  header .nav a {
    font-size: 13px; color: var(--text-secondary); text-decoration: none;
    padding: 8px 14px; border-radius: 7px; transition: color .15s, background .15s;
  }
  header .nav a:hover { color: var(--text-primary); background: var(--surface-2); }
  header .nav a.active { color: var(--text-primary); background: var(--surface-2); }

  main { padding: 36px 32px 60px; max-width: 1080px; margin: 0 auto; }

  /* ── Hero / signal readout ───────────────────────── */
  .hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 30px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--signal), var(--accent) 50%, transparent);
  }
  .hero-eyebrow {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted);
    margin-bottom: 14px;
  }
  .hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--signal); }
  .hero-views { font-family: 'JetBrains Mono', monospace; font-size: 54px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; color: var(--text-primary); }
  .hero-sub { font-size: 13px; color: var(--text-secondary); margin-top: 10px; }
  .hero-stats {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
    margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--border-soft);
  }
  .hero-stat { padding-right: 16px; border-right: 1px solid var(--border-soft); }
  .hero-stat:last-child { border-right: none; }
  .hero-stat .val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }
  .hero-stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* ── AI analyst note ─────────────────────────────── */
  .ai-box {
    background: var(--accent-dim); border: 1px solid rgba(124,140,255,.28);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 24px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .ai-box .glyph { font-size: 15px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .ai-label { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); margin-bottom: 6px; }
  .ai-text { font-size: 14px; line-height: 1.65; color: #dfe2f5; }

  /* ── Section scaffolding ──────────────────────────── */
  .digest-section { margin-bottom: 30px; }
  .digest-section-title {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
    margin-bottom: 13px; color: var(--text-primary);
  }
  .digest-section-title .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.live { background: var(--signal); box-shadow: 0 0 0 3px var(--signal-dim); }
  .status-dot.alert { background: var(--alert); box-shadow: 0 0 0 3px var(--alert-dim); }
  .status-dot.idle { background: var(--text-muted); }
  .section-takeaway {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.5;
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 9px;
  }
  .digest-empty {
    color: var(--text-muted); font-size: 13px; padding: 22px; text-align: center;
    background: var(--surface); border: 1px dashed var(--border); border-radius: 12px;
  }

  /* ── Milestone alerts ─────────────────────────────── */
  .milestone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .milestone-card {
    display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--alert);
    border-radius: 10px; padding: 13px 14px; cursor: pointer;
    transition: border-color .15s, transform .1s; text-decoration: none; color: inherit;
  }
  .milestone-card:hover { border-color: var(--alert); transform: translateY(-1px); }
  .milestone-card:hover { border-left-color: var(--alert); }
  .milestone-thumb { width: 50px; height: 66px; border-radius: 7px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; }
  .milestone-thumb-placeholder { width: 50px; height: 66px; border-radius: 7px; background: var(--surface-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .milestone-body { min-width: 0; flex: 1; }
  .milestone-tier {
    display: inline-flex; align-items: center; gap: 4px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-bottom: 6px;
    background: var(--alert-dim); color: var(--alert);
  }
  .milestone-summary { font-size: 13px; line-height: 1.4; color: var(--text-primary); }
  .milestone-summary b { color: var(--accent); font-weight: 600; }
  .milestone-context { font-size: 12px; color: var(--text-secondary); line-height: 1.4; margin-top: 4px; }
  .milestone-context b { color: var(--accent); font-weight: 600; }
  .milestone-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .fan-page-badge {
    display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    padding: 2px 6px; border-radius: 4px; background: var(--fan-dim); color: var(--fan); margin-left: 5px;
  }

  /* ── Activity feed ────────────────────────────────── */
  .activity-list { display: flex; flex-direction: column; gap: 6px; }
  .activity-row {
    display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 14px; text-decoration: none; color: inherit;
    transition: border-color .15s;
  }
  .activity-row:hover { border-color: var(--signal); }
  .activity-thumb { width: 32px; height: 43px; border-radius: 5px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; }
  .activity-thumb-placeholder { width: 32px; height: 43px; border-radius: 5px; background: var(--surface-2); flex-shrink: 0; }
  .activity-info { flex: 1; min-width: 0; }
  .activity-username { font-size: 13px; font-weight: 600; }
  .activity-song { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .activity-stats { text-align: right; flex-shrink: 0; }
  .activity-views { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; color: var(--signal); }
  .activity-likes { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

  /* ── Weekly trend (Chart.js host) ─────────────────── */
  .trend-canvas-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .trend-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .trend-header-label { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .trend-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
  .trend-badge.up { background: var(--signal-dim); color: var(--signal); }
  .trend-badge.down { background: rgba(242,84,91,.13); color: #f2545b; }
  canvas#weekly-trend-chart { width: 100% !important; height: 280px !important; }

  /* ── Campaigns ────────────────────────────────────── */
  .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 13px; }
  .campaigns-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .campaign-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 15px 18px; cursor: pointer; transition: border-color .15s;
  }
  .campaign-row:hover { border-color: var(--accent); }
  .campaign-name { font-size: 14px; font-weight: 600; }
  .campaign-artist { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .campaign-views { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--signal); }
  .campaign-posts { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; text-align: right; }

  .loading { color: var(--text-muted); font-size: 14px; padding: 60px; text-align: center; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>CAMPAIGN TRACKER</div>
  <div class="nav">
    <a href="/" class="active">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
    <a href="/fanpages">Fan Pages</a>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Loading...</div></div>
</main>

<script>
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function stripMd(text) {
  return (text || '').replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/^#+\s/gm, '');
}
function tiktokUrl(username, postId) {
  return `https://tiktok.com/@${encodeURIComponent(username)}/video/${encodeURIComponent(postId)}`;
}
function tierClass(tier) {
  if (tier >= 10000) return 't10000';
  if (tier >= 5000) return 't5000';
  return 't1000';
}
function tierLabel(tier) {
  if (tier >= 10000) return '10K';
  if (tier >= 5000) return '5K';
  return '1K';
}

function milestoneTakeaway(crossings) {
  const soundOnes = crossings.filter(m => m.source_type !== 'fan_page');
  const fanOnes = crossings.filter(m => m.source_type === 'fan_page');
  const campaignNames = [...new Set(soundOnes.map(m => m.campaign_name).filter(Boolean))];
  const parts = [];
  if (soundOnes.length) {
    parts.push(`${soundOnes.length} from ${campaignNames.length ? campaignNames.join(', ') : 'active campaigns'}`);
  }
  if (fanOnes.length) {
    parts.push(`${fanOnes.length} from fan accounts`);
  }
  return `${crossings.length} milestone${crossings.length !== 1 ? 's' : ''} today — ${parts.join(', ')}.`;
}

function renderMilestones(crossings) {
  if (!crossings || !crossings.length) {
    return '<div class="digest-empty">No posts crossed a milestone in the last 24h.</div>';
  }
  const takeaway = `<div class="section-takeaway">${escapeHtml(milestoneTakeaway(crossings))}</div>`;
  const cards = crossings.map(m => {
    const isFan = m.source_type === 'fan_page';
    const context = isFan
      ? `<span class="fan-page-badge">Fan Page</span> @${escapeHtml(m.username)}'s own account`
      : `<b>${escapeHtml(m.campaign_name || 'Unlabeled campaign')}</b>${m.campaign_artist ? ' · ' + escapeHtml(m.campaign_artist) : ''} — using ${escapeHtml(m.sound_title || m.song_name || 'unknown sound')}`;
    return `
    <a class="milestone-card" href="${tiktokUrl(m.username, m.post_id)}" target="_blank">
      ${m.thumbnail
        ? `<img class="milestone-thumb" src="${escapeHtml(m.thumbnail)}" loading="lazy">`
        : `<div class="milestone-thumb-placeholder">🎵</div>`}
      <div class="milestone-body">
        <div class="milestone-tier">${tierLabel(m.tier_crossed)} LIKES</div>
        <div class="milestone-summary">@${escapeHtml(m.username)} crossed ${tierLabel(m.tier_crossed)} likes</div>
        <div class="milestone-context">${context}</div>
        <div class="milestone-meta">${fmt(m.views)} views · ${fmt(m.likes)} likes</div>
      </div>
    </a>
  `;
  }).join('');
  return `${takeaway}<div class="milestone-grid">${cards}</div>`;
}

function activityTakeaway(activity) {
  const soundOnes = activity.filter(p => p.source_type !== 'fan_page');
  const fanOnes = activity.filter(p => p.source_type === 'fan_page');
  const topViews = Math.max(...activity.map(p => p.views || 0));
  const parts = [];
  if (soundOnes.length) parts.push(`${soundOnes.length} tied to campaign sounds`);
  if (fanOnes.length) parts.push(`${fanOnes.length} from fan accounts`);
  return `${activity.length} post${activity.length !== 1 ? 's' : ''} posted in the last 24h — ${parts.join(', ')}. Top post: ${fmt(topViews)} views.`;
}

function renderActivity(activity) {
  if (!activity || !activity.length) {
    return '<div class="digest-empty">No other notable activity in the last 24h yet.</div>';
  }
  const takeaway = `<div class="section-takeaway">${escapeHtml(activityTakeaway(activity))}</div>`;
  const rows = activity.map(p => {
    const isFan = p.source_type === 'fan_page';
    const label = isFan
      ? '<span class="fan-page-badge">Fan Page</span>'
      : `${escapeHtml(p.campaign_name || '')}${p.sound_title || p.song_name ? ' · ' + escapeHtml(p.sound_title || p.song_name) : ''}`;
    return `
    <a class="activity-row" href="${tiktokUrl(p.username, p.post_id)}" target="_blank">
      ${p.thumbnail
        ? `<img class="activity-thumb" src="${escapeHtml(p.thumbnail)}" loading="lazy">`
        : `<div class="activity-thumb-placeholder"></div>`}
      <div class="activity-info">
        <div class="activity-username">@${escapeHtml(p.username)}</div>
        <div class="activity-song">${label}</div>
      </div>
      <div class="activity-stats">
        <div class="activity-views">${fmt(p.views)} views</div>
        <div class="activity-likes">${fmt(p.likes)} likes</div>
      </div>
    </a>
  `;
  }).join('');
  return `${takeaway}<div class="activity-list">${rows}</div>`;
}

function trendChangeBadge(trend) {
  if (!trend || trend.length < 2) return '';
  const last = trend[trend.length - 1].views || 0;
  const prev = trend[trend.length - 2].views || 0;
  if (prev === 0) return '';
  const pct = ((last - prev) / prev) * 100;
  const cls = pct >= 0 ? 'up' : 'down';
  const sign = pct >= 0 ? '+' : '';
  return `<span class="trend-badge ${cls}">${sign}${pct.toFixed(0)}% vs. prior day</span>`;
}

function renderWeeklyTrend(trend) {
  if (!trend || !trend.length) {
    return '<div class="digest-empty">Not enough history yet to show a weekly trend — check back after a few days of the refresh cron running.</div>';
  }
  return `<div class="trend-canvas-wrap">
    <div class="trend-header">
      <div class="trend-header-label">Views, last 7 days</div>
      ${trendChangeBadge(trend)}
    </div>
    <canvas id="weekly-trend-chart"></canvas>
  </div>`;
}

function drawWeeklyTrendChart(trend) {
  const ctx = document.getElementById('weekly-trend-chart');
  if (!ctx || !trend || !trend.length) return;
  if (window._weeklyTrendChart) window._weeklyTrendChart.destroy();

  const labels = trend.map(function(d) {
    const dt = new Date(d.date + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  });
  const views = trend.map(function(d) { return d.views || 0; });

  window._weeklyTrendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Views',
          data: views,
          borderColor: '#3ed598',
          backgroundColor: 'rgba(62,213,152,0.10)',
          borderWidth: 3,
          pointRadius: 5,
          pointHoverRadius: 6,
          pointBackgroundColor: '#3ed598',
          pointBorderColor: '#0a0d12',
          pointBorderWidth: 2,
          tension: 0.3,
          fill: true,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#171c27',
          borderColor: '#232838',
          borderWidth: 1,
          padding: 10,
          titleFont: { family: "'JetBrains Mono', monospace", size: 12 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 13 },
          callbacks: { label: function(item) { return fmt(item.raw) + ' views'; } }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 12, family: "'JetBrains Mono', monospace" }, color: '#8a93a8' } },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { font: { size: 12, family: "'JetBrains Mono', monospace" }, color: '#8a93a8', callback: function(v) { return fmt(v); } }
        }
      }
    }
  });
}

async function load() {
  const res = await fetch('/api/dashboard');
  if (!res.ok) { document.getElementById('content').innerHTML = '<div class="loading">Could not load dashboard.</div>'; return; }
  const d = await res.json();

  const hasMilestones = d.milestone_crossings && d.milestone_crossings.length;
  const hasActivity = d.todays_activity && d.todays_activity.length;
  const hasTrend = d.weekly_trend && d.weekly_trend.length;

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow"><span class="dot"></span>Total Views Tracked</div>
      <div class="hero-views mono">${fmt(d.total_views)}</div>
      <div class="hero-sub">Across ${d.active_campaigns} active campaign${d.active_campaigns !== 1 ? 's' : ''}</div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="val">${fmt(d.total_posts)}</div><div class="lbl">Posts tracked</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_creators)}</div><div class="lbl">Creators</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.views_7d)}</div><div class="lbl">Views this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.posts_7d)}</div><div class="lbl">New posts this week</div></div>
        <div class="hero-stat"><div class="val">${fmt(d.total_sounds || 0)}</div><div class="lbl">Sounds tracked</div></div>
      </div>
    </div>

    ${d.ai_summary ? `
    <div class="ai-box">
      <div class="glyph">✦</div>
      <div>
        <div class="ai-label">Analyst Summary</div>
        <div class="ai-text">${escapeHtml(stripMd(d.ai_summary))}</div>
      </div>
    </div>` : ''}

    <div class="digest-section">
      <div class="digest-section-title"><span class="status-dot ${hasMilestones ? 'alert' : 'idle'}"></span>Crossed a Tier Today</div>
      ${renderMilestones(d.milestone_crossings)}
    </div>

    <div class="digest-section">
      <div class="digest-section-title"><span class="status-dot ${hasActivity ? 'live' : 'idle'}"></span>Today's Activity</div>
      ${renderActivity(d.todays_activity)}
    </div>

    <div class="digest-section">
      <div class="digest-section-title"><span class="status-dot ${hasTrend ? 'live' : 'idle'}"></span>Weekly Trend</div>
      ${renderWeeklyTrend(d.weekly_trend)}
    </div>

    <div class="section-title">Campaigns</div>
    <div class="campaigns-list">
      ${(d.campaign_breakdown || []).map(c => `
        <div class="campaign-row" onclick="window.location.href='/campaigns'">
          <div>
            <div class="campaign-name">${escapeHtml(c.name)}</div>
            <div class="campaign-artist">${escapeHtml(c.artist || '')}</div>
          </div>
          <div style="text-align:right;">
            <div class="campaign-views">${fmt(c.views)}</div>
            <div class="campaign-posts">${c.post_count} posts</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  drawWeeklyTrendChart(d.weekly_trend);
}

load();
</script>
</body>
</html>
