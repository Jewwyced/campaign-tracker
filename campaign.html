<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Campaign</title>
<style>
  :root {
    --bg: #ffffff;
    --surface-1: #f7f7f8;
    --surface-2: #f0f0f2;
    --border: #e4e4e7;
    --text-primary: #18181b;
    --text-secondary: #52525b;
    --text-muted: #a1a1aa;
    --accent: #6366f1;
    --accent-dim: #4f46e5;
    --success-bg: #ecfdf5;
    --success-text: #059669;
    --neutral-bg: #f0f0f2;
    --neutral-text: #71717a;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header {
    display: flex;
    align-items: center;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  header .nav a {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    margin-right: 16px;
  }
  header .nav a:hover { color: var(--text-primary); }

  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }
  .breadcrumb { font-size: 13px; margin-bottom: 16px; }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--text-primary); }

  .campaign-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .campaign-title-row { display: flex; align-items: center; gap: 10px; }
  .campaign-title { font-size: 24px; font-weight: 600; }
  .release-type-badge {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: var(--text-muted);
    background: var(--surface-1);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .campaign-artist { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .pill {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; background: currentColor; }
  .pill.active { background: var(--success-bg); color: var(--success-text); }
  .pill.wrapped { background: var(--neutral-bg); color: var(--neutral-text); }

  select.status-select {
    font-family: inherit; font-size: 13px;
    padding: 7px 12px; border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg); color: var(--text-primary);
    cursor: pointer;
  }

  .section-label {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 12px;
  }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-box { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-box .label { font-size: 12px; color: var(--text-muted); }
  .stat-box .value { font-size: 22px; font-weight: 600; margin-top: 6px; }

  .add-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .add-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .add-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; font-family: inherit; font-size: 14px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text-primary);
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button {
    font-size: 13px; font-family: inherit;
    background: var(--accent); color: white; border: none;
    padding: 9px 16px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled { background: var(--text-muted); cursor: default; }
  #add-song-error { font-size: 13px; color: var(--danger); margin-top: 10px; }
  #status { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; min-height: 16px; }

  .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .song-card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; cursor: pointer;
    transition: border-color .15s;
  }
  .song-card:hover { border-color: var(--accent); }
  .song-card .name { font-size: 15px; font-weight: 600; }
  .song-card .meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .song-card .views { font-size: 16px; font-weight: 600; color: var(--success-text); margin-top: 8px; }
  .empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/campaigns">Campaigns</a>
    <a href="/songs">Songs</a>
    <a href="/artists">Artists</a>
    <a href="/sounds">Sound lookup</a>
  </div>
</header>

<main>
  <div class="breadcrumb"><a href="/campaigns">&larr; All campaigns</a></div>

  <div class="campaign-header">
    <div>
      <div class="campaign-title-row">
        <div class="campaign-title" id="campaign-title">Loading...</div>
        <span class="release-type-badge" id="release-type-badge" style="display:none;"></span>
        <span class="pill" id="status-pill" style="display:none;"><span class="dot"></span><span id="status-pill-text"></span></span>
      </div>
      <div class="campaign-artist" id="campaign-artist"></div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <select class="status-select" id="status-select" onchange="updateStatus()">
        <option value="In Progress">In Progress</option>
        <option value="Wrapped">Wrapped</option>
      </select>
      <button onclick="deleteThisCampaign()" style="background:none; border:1px solid var(--border); color:var(--danger);" title="Delete campaign">Delete</button>
    </div>
  </div>

  <div class="section-label">Overview</div>
  <div class="stat-row">
    <div class="stat-box"><div class="label">Songs</div><div class="value" id="stat-songs">-</div></div>
    <div class="stat-box"><div class="label">Creators</div><div class="value" id="stat-creators">-</div></div>
    <div class="stat-box"><div class="label">Total views</div><div class="value" id="stat-views">-</div></div>
    <div class="stat-box"><div class="label">Avg engagement</div><div class="value" id="stat-eng">-</div></div>
  </div>

  <div id="status"></div>

  <div class="section-label">Songs</div>
  <div class="add-card">
    <div class="add-label">Add a song — we'll find and pull in every sound for it automatically. Include the artist for better matches, e.g. "Griddle Yeat"</div>
    <div class="add-row">
      <input type="text" id="song-name-input" placeholder="Song name + artist, e.g. Griddle Yeat">
      <button onclick="addSong()" id="add-song-btn">Add song</button>
    </div>
    <div id="add-song-error"></div>
    <div id="add-song-status" style="font-size:13px; color:var(--text-muted); margin-top:8px;"></div>
  </div>

  <div class="songs-grid" id="songs-grid"></div>
</main>

<script>
const campaignId = window.location.pathname.split('/').pop();
let campaignData = null;
let songsData = [];

function fmt(n) {
  if (n == null || isNaN(n)) return '-';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function pct(n) {
  if (n == null || isNaN(n)) return '-';
  return (n * 100).toFixed(1) + '%';
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function load() {
  try {
    const res = await fetch(`/api/campaigns/${campaignId}/posts`);
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('campaign-title').textContent = data.error || 'Campaign not found';
      return;
    }
    campaignData = data.campaign;

    document.getElementById('campaign-title').textContent = campaignData.name;
    document.getElementById('campaign-artist').textContent = campaignData.artist || '';
    document.getElementById('status-select').value = campaignData.status;

    const badge = document.getElementById('release-type-badge');
    badge.textContent = campaignData.release_type === 'album' ? 'Album' : 'Single';
    badge.style.display = 'inline-block';

    const isActive = campaignData.status === 'In Progress';
    const pillEl = document.getElementById('status-pill');
    pillEl.className = 'pill ' + (isActive ? 'active' : 'wrapped');
    document.getElementById('status-pill-text').textContent = campaignData.status;
    pillEl.style.display = 'inline-flex';

    await loadSongs();
    document.getElementById('status').textContent = '';
  } catch (e) {
    document.getElementById('status').textContent = 'Could not reach the server.';
  }
}

async function loadSongs() {
  try {
    const res = await fetch(`/api/campaigns/${campaignId}/songs`);
    songsData = await res.json();
    renderSongs();
    renderOverviewStats();
  } catch (e) {
    document.getElementById('songs-grid').innerHTML = '<div class="empty">Could not load songs.</div>';
  }
}

function renderOverviewStats() {
  let totalViews = 0, totalLikes = 0, totalComments = 0, totalSaves = 0;
  const allCreators = new Set();

  songsData.forEach(song => {
    song.sounds.forEach(snd => {
      totalViews += parseInt(snd.views) || 0;
      totalLikes += parseInt(snd.likes) || 0;
    });
  });

  document.getElementById('stat-songs').textContent = songsData.length;
  document.getElementById('stat-views').textContent = fmt(totalViews);
  // Creators and engagement need post-level data; approximate from songs list for now
  document.getElementById('stat-creators').textContent = songsData.reduce((sum, s) => sum + (s.creator_count || 0), 0) || '-';
  const avgEng = totalViews > 0 ? totalLikes / totalViews : 0;
  document.getElementById('stat-eng').textContent = pct(avgEng);
}

function renderSongs() {
  const grid = document.getElementById('songs-grid');
  if (songsData.length === 0) {
    grid.innerHTML = '<div class="empty">No songs added yet.<br><span style="font-size:13px;">Add one above to get started.</span></div>';
    return;
  }
  grid.innerHTML = songsData.map(s => {
    const totalViews = s.sounds.reduce((sum, snd) => sum + (parseInt(snd.views) || 0), 0);
    const totalPosts = s.sounds.reduce((sum, snd) => sum + (parseInt(snd.post_count) || 0), 0);
    return `
      <div class="song-card" onclick="window.location.href='/song/${s.id}'">
        <div class="name">${escapeHtml(s.name)}</div>
        <div class="meta">${s.sounds.length} sound${s.sounds.length === 1 ? '' : 's'} · ${totalPosts} posts</div>
        <div class="views">${fmt(totalViews)} views</div>
      </div>
    `;
  }).join('');
}

async function addSong() {
  const input = document.getElementById('song-name-input');
  const btn = document.getElementById('add-song-btn');
  const errEl = document.getElementById('add-song-error');
  const statusEl = document.getElementById('add-song-status');
  const name = input.value.trim();
  if (!name) return;

  btn.disabled = true;
  btn.textContent = 'Searching...';
  errEl.textContent = '';
  statusEl.textContent = 'Finding sounds for this song — this can take a moment...';

  try {
    const res = await fetch(`/api/songs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Something went wrong.';
      statusEl.textContent = '';
    } else {
      input.value = '';
      statusEl.textContent = `Found and added ${data.sounds_found} sound${data.sounds_found === 1 ? '' : 's'}.`;
      await loadSongs();
    }
  } catch (e) {
    errEl.textContent = 'Could not reach the server.';
    statusEl.textContent = '';
  }

  btn.disabled = false;
  btn.textContent = 'Add song';
}

async function updateStatus() {
  const status = document.getElementById('status-select').value;
  await fetch(`/api/campaigns/${campaignId}/status`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  load();
}

async function deleteThisCampaign() {
  const name = document.getElementById('campaign-title').textContent;
  if (!confirm(`Delete "${name}"? This can't be undone.`)) return;
  await fetch(`/api/campaigns/${campaignId}`, { method: 'DELETE' });
  window.location.href = '/campaigns';
}

document.getElementById('song-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSong();
});

load();
</script>

</body>
</html>
